<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Workout Guide + Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f0f0f; color: #e8e8e8;
  max-width: 480px; margin: 0 auto;
  padding: 20px 16px 60px; min-height: 100vh;
}
.screen { display: none; }
.screen.active { display: block; }
h1 { font-size: 20px; font-weight: 600; color: #f0f0f0; margin-bottom: 2px; }
.sub { font-size: 13px; color: #888; }
.sec-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: #555; margin: 20px 0 10px; }

/* HOME — single column */
.day-list { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
.day-btn {
  background: #1a1a1a; border: 1px solid #2e2e2e;
  border-radius: 14px; padding: 14px 16px;
  text-align: left; cursor: pointer; width: 100%;
  display: flex; align-items: center; gap: 14px;
}
.day-btn:active { background: #222; }
.day-btn .day-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.day-btn.push  .day-dot { background: #c8f060; }
.day-btn.pull  .day-dot { background: #60d4f0; }
.day-btn.lower .day-dot { background: #f0a060; }
.day-btn.rec   .day-dot { background: #60f0b0; }
.day-btn .day-main { flex: 1; min-width: 0; }
.day-btn .dl { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 2px; }
.day-btn .dn { font-size: 15px; font-weight: 600; color: #e8e8e8; }
.day-btn .df { font-size: 12px; color: #666; }
.day-btn .last-info { font-size: 11px; color: #555; flex-shrink: 0; }

/* DAY VIEW */
.pbar-wrap { background: #222; border-radius: 99px; height: 3px; margin: 16px 0 18px; }
.pbar-fill { height: 100%; background: #7F77DD; border-radius: 99px; transition: width 0.3s; }
.top-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.back-btn {
  background: #1a1a1a; border: 1px solid #2e2e2e;
  border-radius: 8px; padding: 8px 14px;
  font-size: 13px; color: #888; cursor: pointer;
}

/* EXERCISE CARDS IN DAY LIST */
.ex-card {
  background: #1a1a1a; border: 1px solid #2a2a2a;
  border-radius: 12px; margin-bottom: 8px; overflow: hidden;
}
.ex-card.done-card { opacity: 0.42; }
.ex-card-header {
  padding: 13px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer;
}
.ex-card-header:active { background: #202020; }
.chk {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1.5px solid #3a3a3a; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.done-card .chk { background: #3B6D11; border-color: #3B6D11; color: #fff; }
.rec-chk {
  width: 26px; height: 26px; border-radius: 7px;
  border: 1.5px solid #3a3a3a; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.done-card .rec-chk { background: #0a2a1a; border-color: #60f0b0; color: #60f0b0; }
.ex-info { flex: 1; min-width: 0; }
.ex-name-list { font-size: 14px; font-weight: 500; color: #e8e8e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ex-meta-list { font-size: 12px; color: #666; margin-top: 2px; }
.card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.pbadge { font-size: 11px; padding: 3px 8px; border-radius: 6px; white-space: nowrap; font-weight: 500; }
.pbadge.up    { background: #0e1f08; color: #7ab840; }
.pbadge.close { background: #1f1508; color: #d4943a; }
.expand-arr { font-size: 13px; color: #444; transition: transform 0.2s; width: 18px; text-align: center; }
.expand-arr.open { transform: rotate(180deg); }

/* INLINE CUES */
.ex-cues-panel { display: none; border-top: 1px solid #242424; padding: 12px 14px 14px; }
.ex-cues-panel.open { display: block; }
.cue-row { margin-bottom: 9px; }
.cue-row:last-child { margin-bottom: 0; }
.cue-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #555; margin-bottom: 3px; }
.cue-txt { font-size: 13px; color: #bbb; line-height: 1.5; }
.cue-avoid {
  margin-top: 9px; font-size: 13px; color: #e08080;
  padding: 8px 10px; background: #1f1010;
  border-radius: 8px; border-left: 2px solid #803030; line-height: 1.5;
}
.cue-avoid strong { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; margin-right: 4px; }
.log-from-list-btn {
  width: 100%; margin-top: 12px; padding: 11px;
  background: #222; border: 1px solid #333; border-radius: 10px;
  font-size: 13px; font-weight: 500; color: #9994dd; cursor: pointer; font-family: inherit;
}
.log-from-list-btn:active { background: #2a2a2a; }

.sec-header {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  color: #555; margin: 18px 0 8px; padding-bottom: 6px;
  border-bottom: 1px solid #1e1e1e;
}

/* LOGGING SCREEN */
.ex-log-name { font-size: 18px; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
.sets-tag { font-size: 11px; padding: 3px 10px; border-radius: 6px; font-weight: 500; display: inline-block; margin-bottom: 14px; background: #1f1f35; color: #9994dd; border: 1px solid #3a3575; }

.prog-banner { border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 12px; font-weight: 500; line-height: 1.4; }
.prog-banner.up    { background: #0e1f08; color: #7ab840; border: 1px solid #3B6D11; }
.prog-banner.close { background: #1f1508; color: #d4943a; border: 1px solid #854F0B; }
.last-box { background: #181818; border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; }
.last-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #555; margin-bottom: 8px; }
.last-sets { display: flex; gap: 6px; flex-wrap: wrap; }
.lset { background: #222; border: 1px solid #333; border-radius: 6px; padding: 4px 10px; font-size: 12px; color: #aaa; }
.lset.top { border-color: #3B6D11; color: #7ab840; }
.no-last { color: #444; font-size: 12px; font-style: italic; }

.sets-wrap { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
.set-row {
  background: #1a1a1a; border: 1px solid #2a2a2a;
  border-radius: 12px; padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  transition: border-color 0.2s, background 0.2s;
}
.set-row.logged { border-color: #3B6D11; background: #111a0e; }
.set-lbl { font-size: 12px; color: #555; width: 32px; flex-shrink: 0; }
.inputs-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ig label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
.stepper { display: flex; align-items: center; background: #111; border: 1px solid #333; border-radius: 8px; overflow: hidden; height: 38px; }
.stepper button {
  width: 34px; height: 100%; background: #1e1e1e; border: none;
  color: #aaa; font-size: 18px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.stepper button:active { background: #2a2a2a; }
.stepper input {
  flex: 1; background: transparent; border: none;
  text-align: center; font-size: 15px; font-weight: 600;
  color: #e8e8e8; height: 100%; outline: none;
  font-family: inherit; -moz-appearance: textfield;
}
.stepper input::-webkit-inner-spin-button,
.stepper input::-webkit-outer-spin-button { -webkit-appearance: none; }
.log-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1.5px solid #333; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 15px; color: #555; transition: all 0.15s;
}
.log-btn.logged { background: #3B6D11; border-color: #3B6D11; color: #fff; }
.log-btn:active { transform: scale(0.92); }

/* WALK LOGGING */
.walk-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.walk-card-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #555; margin-bottom: 12px; }
.walk-last { font-size: 12px; color: #444; margin-bottom: 14px; font-style: italic; }
.walk-fields { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 4px; }
.wf { display: flex; flex-direction: column; gap: 5px; }
.wf label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
.wf input {
  background: #111; border: 1px solid #333; border-radius: 8px;
  color: #e8e8e8; font-size: 16px; font-weight: 600;
  text-align: center; padding: 10px 4px; outline: none;
  font-family: inherit; -moz-appearance: textfield; width: 100%;
}
.wf input::-webkit-inner-spin-button,
.wf input::-webkit-outer-spin-button { -webkit-appearance: none; }
.wf .wf-unit { font-size: 10px; color: #444; text-align: center; }
.log-action-btn {
  width: 100%; padding: 14px; border-radius: 12px;
  font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
  border: 1px solid #2a2a2a; background: #1a1a1a; color: #e8e8e8;
  transition: all 0.2s; margin-top: 12px;
}
.log-action-btn.logged-rec { background: #0a2a1a; border-color: #60f0b0; color: #60f0b0; }

/* NAV */
.nav-bar { display: flex; gap: 8px; margin-top: 18px; position: sticky; bottom: 20px; }
.nbtn {
  flex: 1; padding: 15px 10px; border-radius: 12px;
  font-size: 14px; font-weight: 500; cursor: pointer;
  border: 1px solid #2e2e2e; background: #1a1a1a; color: #e8e8e8; font-family: inherit;
}
.nbtn:active { background: #222; }
.nbtn.primary { background: #7F77DD; color: #fff; border-color: #7F77DD; }
.nbtn.primary:active { background: #534AB7; }
.nbtn.rec-primary { background: #0a2a1a; color: #60f0b0; border-color: #60f0b0; }
.nbtn.ghost { color: #555; }

/* FINISH */
.finish-icon {
  width: 52px; height: 52px; border-radius: 50%;
  background: #0e1f08; border: 1px solid #3B6D11;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin: 0 auto 16px;
}
.s-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 12px 14px; }
.s-card .sv { font-size: 20px; font-weight: 600; color: #e8e8e8; }
.s-card .sl { font-size: 10px; color: #555; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.s-card.green { border-color: #3B6D11; background: #111a0e; }
.s-card.green .sv { color: #7ab840; }
</style>
</head>
<body>

<!-- HOME -->
<div id="s-home" class="screen active">
  <h1>Workout Guide</h1>
  <p class="sub">Select today's session</p>
  <div class="day-list" id="day-list"></div>
  <p class="sec-lbl" style="margin-top:24px;">This week</p>
  <div id="week-summary" style="color:#555;font-size:13px;"></div>
</div>

<!-- DAY VIEW -->
<div id="s-day" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showHome()">← Home</button>
    <div style="flex:1">
      <div id="day-title" style="font-size:17px;font-weight:600;"></div>
      <div id="day-date" class="sub" style="font-size:12px;"></div>
    </div>
  </div>
  <div class="pbar-wrap"><div class="pbar-fill" id="day-pbar" style="width:0%"></div></div>
  <div id="ex-list"></div>
  <div class="nav-bar">
    <button class="nbtn ghost" onclick="showHome()">Done</button>
    <button class="nbtn primary" id="day-next-btn" onclick="openNextItem()">Start first →</button>
  </div>
</div>

<!-- EXERCISE LOG -->
<div id="s-ex" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showDay()">← Day</button>
    <div id="ex-counter" class="sub" style="font-size:12px;margin-left:auto;"></div>
  </div>
  <div class="ex-log-name" id="ex-log-name"></div>
  <div id="ex-sets-tag"></div>
  <div id="prog-banner-wrap"></div>
  <div id="last-session-wrap"></div>
  <div class="sets-wrap" id="sets-wrap"></div>
  <div class="nav-bar">
    <button class="nbtn ghost" id="prev-btn" onclick="goPrevItem()">← Prev</button>
    <button class="nbtn primary" id="next-btn" onclick="goNextItem()">Next →</button>
  </div>
</div>

<!-- RECOVERY LOG -->
<div id="s-rec" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showDay()">← Day</button>
    <div id="rec-counter" class="sub" style="font-size:12px;margin-left:auto;"></div>
  </div>
  <div class="ex-log-name" id="rec-log-name"></div>
  <div id="rec-log-area"></div>
  <div class="nav-bar">
    <button class="nbtn ghost" id="rec-prev-btn" onclick="goPrevItem()">← Prev</button>
    <button class="nbtn rec-primary" id="rec-next-btn" onclick="goNextItem()">Next →</button>
  </div>
</div>

<!-- FINISH -->
<div id="s-finish" class="screen">
  <div class="finish-icon">✓</div>
  <h1 style="text-align:center;margin-bottom:6px;">Session done</h1>
  <p class="sub" style="text-align:center;margin-bottom:20px;" id="finish-date"></p>
  <div id="finish-summary"></div>
  <p class="sec-lbl">Progression flags</p>
  <div id="finish-flags" style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px;"></div>
  <button class="nbtn primary" style="width:100%;padding:16px;font-family:inherit;" onclick="showHome()">Back to home</button>
</div>

<script>
const DAYS = [
  {
    id:'upperA', label:'Mon', name:'Upper A', focus:'Push bias', type:'push',
    exercises:[
      {id:'inc_press', name:'Incline Machine / Cable Press', sets:4, rng:[6,10],
       cues:{feel:'Upper chest doing the work. Squeeze at the top without locking elbows hard.',posture:'Slight arch, chest up, scapula back and down. Elbows at 45–60° from torso — not flared wide.',avoid:'Shoulders rolling forward at the top or neck craning forward under load.'}},
      {id:'flat_press', name:'Flat Machine Press', sets:3, rng:[8,12],
       cues:{feel:'Mid-chest stretch at the bottom, full contraction at the top. Machines keep tension — use it.',posture:'Scapula retracted and depressed. Feet flat. Head rests neutrally.',avoid:'Neck pushing into the headrest or shoulders rolling forward at the top.'}},
      {id:'cs_row_a', name:'Chest-Supported Row', sets:3, rng:[8,12],
       cues:{feel:'Mid-back squeezing at peak contraction. Think "elbows to pockets." 1s pause at peak.',posture:'Chest firmly on pad. Retract scapula before pulling. Elbows drive back and in.',avoid:'Hitching or neck straining to complete reps. The chest support eliminates compensation — use it.'}},
      {id:'lat_raise_a', name:'Cable Lateral Raise', sets:3, rng:[12,15],
       cues:{feel:'Side delt burning — not traps. Traps firing = weight too heavy.',posture:'Slight forward lean, slight elbow bend. Raise to shoulder height. Slow eccentric.',avoid:'Shrugging. The lowering phase is where most of the work happens.'}},
      {id:'pushdown_a', name:'Rope Pushdown', sets:3, rng:[10,15],
       cues:{feel:'Full tricep squeeze at lockout. Separate the rope handles at the bottom.',posture:'Slight forward lean, elbows pinned to sides. Neutral arms.',avoid:'Elbows flaring or body swing. Neck stays neutral.'}},
      {id:'face_pull_a', name:'Face Pull', sets:3, rng:[12,15],
       cues:{feel:'Rear delts and external rotators. Hands end beside ears, elbows high and wide.',posture:'Cable at or above eye level. Light weight, full range. Elbows high — double-bicep position.',avoid:'Heavy loading. This is shoulder health work — form collapse here is a real injury risk.'}},
      {id:'curl_a', name:'Cable Curl', sets:3, rng:[10,12],
       cues:{feel:'Full bicep stretch at the bottom. Cable keeps tension. Squeeze hard at the top.',posture:'Elbows pinned to sides. Stand tall. Don\'t lean back.',avoid:'Momentum or swinging. Drop weight before dropping form.'}},
    ]
  },
  {
    id:'lowerA', label:'Tue', name:'Lower A', focus:'Quad focus', type:'lower',
    exercises:[
      {id:'leg_press_a', name:'Leg Press', sets:4, rng:[8,12],
       cues:{feel:'Quads loading through the full range. Deep stretch at bottom, strong push through heel and midfoot.',posture:'Feet mid-platform, hip-width. Lower back stays on pad throughout.',avoid:'Locking out knees at the top. Lumbar rounding off the pad at depth.'}},
      {id:'bss', name:'Bulgarian Split Squat', sets:3, rng:[10,10],
       cues:{feel:'Front leg quad and glute doing the work. Rear leg is just for balance.',posture:'Front foot far enough forward that knee stays over foot. Torso upright.',avoid:'Front knee caving inward. Do the weaker leg first.'}},
      {id:'leg_ext', name:'Leg Extension', sets:3, rng:[12,15],
       cues:{feel:'VMO (inner quad, just above kneecap) contracting hard. Hold 1s at top.',posture:'Pad just above the ankle. Sit fully back. 3s eccentric down.',avoid:'Swinging or momentum. Reduce range before reducing weight if knee is uncomfortable.'}},
      {id:'seat_curl', name:'Seated Leg Curl', sets:3, rng:[10,15],
       cues:{feel:'Hamstring stretch at full extension. Drive heels toward glutes.',posture:'Preferred over lying — less lumbar compression. Hips stay flat.',avoid:'Hips lifting off the seat to assist the curl.'}},
      {id:'calf_a', name:'Calf Raises', sets:3, rng:[12,15],
       cues:{feel:'Full stretch at the bottom, hard squeeze at the top. Pause 1s at peak.',posture:'On a step for full range. Drive through the big toe side.',avoid:'Bouncing through the bottom. Calves need slow, full-range work.'}},
      {id:'pallof_a', name:'Pallof Press', sets:3, rng:[10,12],
       cues:{feel:'Core resisting rotation — that\'s the whole point. The press is secondary.',posture:'Side-on to cable. Press straight out, hold 1s, return. Hips square throughout.',avoid:'Rotating toward or away from the cable. That means the weight is too heavy.'}},
      {id:'hang_knee_a', name:'Lying Leg Raise', sets:3, rng:[10,12],
       cues:{feel:'Lower abs and hip flexors working together. The effort should be felt below the navel.',posture:'Lie flat on a bench or floor, hands under your lower back for support. Legs straight or slightly bent. Raise legs to vertical, lower slowly under control.',avoid:'Lower back arching off the surface as legs descend — that means the abs have lost tension. Stop the range there or reduce reps.'}},
    ]
  },
  {
    id:'recovery', label:'Wed', name:'Recovery', focus:'Cardio + Mobility', type:'recovery',
    exercises:[
      {id:'incline_walk', name:'Incline Walk', type:'walk', target:'20–30 min', section:'Cardio',
       cues:{feel:'Conversational pace — you should be able to talk comfortably. Active recovery, not training.',posture:'Natural upright posture. Arms swinging freely — don\'t hold the handrails.',avoid:'Going too fast or too steep. The goal is blood flow and recovery, not extra training stress.'}},
      {id:'jefferson_curl', name:'Jefferson Curl (light)', type:'check', target:'2–3 × 8', section:'Posterior Chain',
       cues:{feel:'Sequential spinal flexion from top down. Each vertebra peeling forward, one at a time.',posture:'Stand on a step. Tuck chin, round upper back first, then mid, then lower. Reverse slowly.',avoid:'Heavy loading — therapeutic only. Progress over months not weeks. Stop if neck pressure occurs.'}},
      {id:'active_hamstring', name:'Active Hamstring Stretch', type:'check', target:'2 × 30s each side', section:'Posterior Chain',
       cues:{feel:'Hamstring lengthening under active tension — not passive hanging.',posture:'Lying, band around foot, extend leg up, other leg flat. Actively pull with the hip flexor.',avoid:'Passively hanging from the band.'}},
      {id:'worlds_greatest', name:'World\'s Greatest Stretch', type:'check', target:'2 × 5/side', section:'Hips',
       cues:{feel:'Hip flexor, thoracic rotation, hamstring, groin — all in one sequence.',posture:'Lunge → drop back knee → rotate torso reaching to ceiling → reach to floor. Breathe into each position.',avoid:'Rushing. Move slowly and breathe through each component.'}},
      {id:'hip_90_90', name:'90/90 Hip Rotations', type:'check', target:'2 × 8/side', section:'Hips',
       cues:{feel:'Active range in internal and external hip rotation.',posture:'Sit on floor, both legs at 90°. Rotate between internal and external. Torso upright.',avoid:'Flopping passively. Push through the resistance.'}},
      {id:'cat_cow', name:'Cat-Cow', type:'check', target:'2 × 10', section:'Spine',
       cues:{feel:'Sequential spinal movement. Especially beneficial for your cervical disc — let it be fluid.',posture:'On all fours. Exhale and round fully (cat), inhale and extend (cow).',avoid:'Jerky or forced movement. Slow and fluid.'}},
      {id:'thread_needle', name:'Thread the Needle', type:'check', target:'2 × 8/side', section:'Spine',
       cues:{feel:'Thoracic rotation opening up. Follow your hand with your eyes.',posture:'On all fours. Thread one arm under the body, rotating through the thoracic spine.',avoid:'Forcing range through the shoulder — this is about the thoracic spine.'}},
      {id:'chin_tucks_w', name:'Chin Tucks', type:'check', target:'2 × 10 (hold 3–5s)', section:'Neck + Shoulders',
       cues:{feel:'Gentle lengthening at the base of the skull. A glide, not a squeeze. Hold longer on recovery days.',posture:'Seated or standing. Draw chin straight back (double chin). Eyes level.',avoid:'Tilting the head down or pushing through any pressure or tingling.'}},
      {id:'wall_slides', name:'Wall Slides', type:'check', target:'2 × 10', section:'Neck + Shoulders',
       cues:{feel:'Lower traps and serratus activating as you slide up. Scapulae stay flat on the wall.',posture:'Back, elbows, and wrists against the wall. Slide arms up without losing contact.',avoid:'Any part lifting off the wall. Range will improve over time.'}},
      {id:'band_pull_w', name:'Band Pull-Aparts', type:'check', target:'2 × 15', section:'Neck + Shoulders',
       cues:{feel:'Squeeze between shoulder blades at full extension. Rear delts and mid-traps.',posture:'Arms at shoulder height, light band. Pull until band touches chest. Control the return.',avoid:'Shrugging or a band so heavy it yanks the neck.'}},
      {id:'neck_iso', name:'Neck Isometrics', type:'check', target:'2 × 8s × 4 directions', section:'Neck + Shoulders',
       cues:{feel:'Gentle muscle activation — not a strain. Head stays completely still.',posture:'Press palm against forehead, back of head, and each side. Press head into hand, hand resists — neither moves.',avoid:'Any actual neck movement. Truly isometric. Start at 30% effort. Stop immediately at any tingling or pain.'}},
      {id:'toe_touch', name:'Toe-Touch Drill', type:'check', target:'3–4 slow reps', section:'Finishing Drill',
       cues:{feel:'Nervous system reset. Breathe into the hamstrings at the bottom.',posture:'Stand tall, inhale, exhale and fold forward. Uncurl back up vertebra by vertebra.',avoid:'Rushing. This is mindful movement, not athletic.'}},
    ]
  },
  {
    id:'upperB', label:'Thu', name:'Upper B', focus:'Pull bias', type:'pull',
    exercises:[

let currentDay = null;
let currentItemIdx = 0;
let sessionData = {};
let recoveryData = {};
let historyCache = {};

function today() { return new Date().toISOString().split('T')[0]; }
function formatDate(d) {
  if (!d) return '';
  return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', {day:'numeric', month:'short'});
}
function lsKey(dayId, exId) { return 'wt4_' + dayId + '_' + exId; }
function loadHist(dayId, exId) {
  try { const v = localStorage.getItem(lsKey(dayId, exId)); if (v) return JSON.parse(v); } catch(e) {}
  return { sessions: [] };
}
function saveHist(dayId, exId, data) {
  try { localStorage.setItem(lsKey(dayId, exId), JSON.stringify(data)); } catch(e) {}
}
function getLastDate(dayId) {
  const day = DAYS.find(d => d.id === dayId);
  if (!day || !day.exercises.length) return null;
  const h = loadHist(dayId, day.exercises[0].id);
  return h.sessions.length > 0 ? h.sessions[h.sessions.length-1].date : null;
}
function getProgStatus(sessions, rng) {
  if (!sessions || !sessions.length) return null;
  const last = sessions[sessions.length-1];
  const allTop = last.sets && last.sets.every(s => s.r >= rng[1]);
  if (sessions.length >= 2 && allTop && sessions[sessions.length-2].sets && sessions[sessions.length-2].sets.every(s => s.r >= rng[1])) return 'up';
  return allTop ? 'close' : null;
}
function getItemDone(ex) {
  if (ex.type === 'walk' || ex.type === 'check') return !!recoveryData[ex.id];
  return !!(sessionData[ex.id] && sessionData[ex.id].filter(Boolean).length > 0);
}
function buildCuesHtml(c) {
  if (!c) return '';
  let h = '';
  if (c.feel) h += `<div class="cue-row"><div class="cue-lbl">Feel</div><div class="cue-txt">${c.feel}</div></div>`;
  if (c.posture) h += `<div class="cue-row"><div class="cue-lbl">Posture</div><div class="cue-txt">${c.posture}</div></div>`;
  if (c.avoid) h += `<div class="cue-avoid"><strong>Avoid — </strong>${c.avoid}</div>`;
  return h;
}

// ── HOME ─────────────────────────────────────────────────────────
function showHome() {
  currentDay = null; sessionData = {}; historyCache = {}; recoveryData = {};
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-home').classList.add('active');
  renderHome();
}
function renderHome() {
  const list = document.getElementById('day-list');
  list.innerHTML = '';
  let doneToday = 0;
  for (const d of DAYS) {
    const lastDate = getLastDate(d.id);
    if (lastDate === today()) doneToday++;
    const btn = document.createElement('button');
    btn.className = 'day-btn ' + (d.type === 'recovery' ? 'rec' : d.type);
    btn.innerHTML = `<div class="day-dot"></div><div class="day-main"><div class="dl">${d.label}</div><div class="dn">${d.name}</div><div class="df">${d.focus}</div></div><div class="last-info">${lastDate ? formatDate(lastDate) : '—'}</div>`;
    btn.onclick = () => openDay(d.id);
    list.appendChild(btn);
  }
  document.getElementById('week-summary').textContent = doneToday === 0 ? 'No sessions logged today.' : `${doneToday} of ${DAYS.length} sessions logged today.`;
}

// ── DAY VIEW ─────────────────────────────────────────────────────
function openDay(dayId) {
  currentDay = DAYS.find(d => d.id === dayId);
  sessionData = {}; recoveryData = {}; historyCache = {};
  for (const ex of currentDay.exercises) historyCache[ex.id] = loadHist(dayId, ex.id);
  document.getElementById('day-title').textContent = currentDay.name + ' — ' + currentDay.focus;
  document.getElementById('day-date').textContent = formatDate(today());
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-day').classList.add('active');
  renderExList();
}

function toggleCardCues(idx) {
  const panel = document.getElementById('cues-panel-' + idx);
  const arr = document.getElementById('expand-arr-' + idx);
  const open = panel.classList.toggle('open');
  arr.classList.toggle('open', open);
}

function renderExList() {
  const list = document.getElementById('ex-list');
  list.innerHTML = '';
  const total = currentDay.exercises.length;
  const done = currentDay.exercises.filter(ex => getItemDone(ex)).length;
  document.getElementById('day-pbar').style.width = (done / total * 100) + '%';

  if (currentDay.type === 'recovery') {
    let lastSec = null;
    currentDay.exercises.forEach((ex, i) => {
      const sec = ex.section || 'General';
      if (sec !== lastSec) {
        const sh = document.createElement('div'); sh.className = 'sec-header'; sh.textContent = sec; list.appendChild(sh); lastSec = sec;
      }
      const isDone = getItemDone(ex);
      const card = document.createElement('div');
      card.className = 'ex-card' + (isDone ? ' done-card' : '');
      card.id = 'card-' + i;
      let meta = ex.target;
      if (ex.type === 'walk' && recoveryData[ex.id]) { const r = recoveryData[ex.id]; meta = `${r.min}min · ${r.incline}% · ${r.pace}km/h`; }
      const logBtnTxt = ex.type === 'walk' ? 'Log walk →' : (isDone ? '✓ Marked done' : 'Mark as done →');
      card.innerHTML = `
        <div class="ex-card-header" onclick="toggleCardCues(${i})">
          <div class="rec-chk">${isDone ? '✓' : ''}</div>
          <div class="ex-info"><div class="ex-name-list">${ex.name}</div><div class="ex-meta-list">${meta}</div></div>
          <div class="card-right"><span class="expand-arr" id="expand-arr-${i}">▾</span></div>
        </div>
        <div class="ex-cues-panel" id="cues-panel-${i}">
          ${buildCuesHtml(ex.cues)}
          <button class="log-from-list-btn" onclick="openItem(${i})">${logBtnTxt}</button>
        </div>`;
      list.appendChild(card);
    });
  } else {
    currentDay.exercises.forEach((ex, i) => {
      const isDone = getItemDone(ex);
      const h = historyCache[ex.id];
      const prog = ex.rng ? getProgStatus(h.sessions, ex.rng) : null;
      let lastW = '';
      if (h.sessions.length > 0 && h.sessions[h.sessions.length-1].sets?.length > 0) {
        const avg = Math.round(h.sessions[h.sessions.length-1].sets.reduce((a,s)=>a+(s.w||0),0)/h.sessions[h.sessions.length-1].sets.length);
        if (avg > 0) lastW = ' · ' + avg + 'kg';
      }
      const progBadge = prog === 'up' ? '<span class="pbadge up">↑ Add weight</span>' : prog === 'close' ? '<span class="pbadge close">→ One more</span>' : '';
      const card = document.createElement('div');
      card.className = 'ex-card' + (isDone ? ' done-card' : '');
      card.id = 'card-' + i;
      card.innerHTML = `
        <div class="ex-card-header" onclick="toggleCardCues(${i})">
          <div class="chk">${isDone ? '✓' : ''}</div>
          <div class="ex-info"><div class="ex-name-list">${ex.name}</div><div class="ex-meta-list">${ex.sets}×${ex.rng[0]}–${ex.rng[1]}${lastW}</div></div>
          <div class="card-right">${progBadge}<span class="expand-arr" id="expand-arr-${i}">▾</span></div>
        </div>
        <div class="ex-cues-panel" id="cues-panel-${i}">
          ${buildCuesHtml(ex.cues)}
          <button class="log-from-list-btn" onclick="openItem(${i})">Log sets →</button>
        </div>`;
      list.appendChild(card);
    });
  }

  const btn = document.getElementById('day-next-btn');
  const firstUndone = currentDay.exercises.findIndex(ex => !getItemDone(ex));
  if (firstUndone === -1) { btn.textContent = 'Finish session →'; btn.onclick = finishSession; }
  else { btn.textContent = firstUndone === 0 ? 'Start first →' : 'Continue →'; btn.onclick = () => openItem(firstUndone); }
}

function openNextItem() {
  const first = currentDay.exercises.findIndex(ex => !getItemDone(ex));
  if (first === -1) finishSession(); else openItem(first);
}
function openItem(idx) {
  currentItemIdx = idx;
  const ex = currentDay.exercises[idx];
  if (ex.type === 'walk' || ex.type === 'check') openRecItem(idx); else openExercise(idx);
}

// ── EXERCISE LOG ─────────────────────────────────────────────────
function openExercise(idx) {
  const ex = currentDay.exercises[idx];
  const h = historyCache[ex.id];
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-ex').classList.add('active');
  document.getElementById('ex-log-name').textContent = ex.name;
  document.getElementById('ex-counter').textContent = (idx+1) + ' / ' + currentDay.exercises.length;
  document.getElementById('ex-sets-tag').innerHTML = `<span class="sets-tag">${ex.sets} sets · ${ex.rng[0]}–${ex.rng[1]} reps</span>`;
  const prog = ex.rng ? getProgStatus(h.sessions, ex.rng) : null;
  document.getElementById('prog-banner-wrap').innerHTML = prog === 'up' ? '<div class="prog-banner up">↑ Increase weight today — top rep range hit 2 sessions in a row</div>' : prog === 'close' ? '<div class="prog-banner close">→ Hit top rep range again to unlock weight increase</div>' : '';
  const lw = document.getElementById('last-session-wrap');
  if (h.sessions.length > 0) {
    const ls = h.sessions[h.sessions.length-1];
    const sh = (ls.sets||[]).map(s => `<span class="lset ${s.r>=ex.rng[1]?'top':''}">${s.w>0?s.w+'kg × ':''}${s.r}r</span>`).join('');
    lw.innerHTML = `<div class="last-box"><div class="last-lbl">Last · ${formatDate(ls.date)}</div><div class="last-sets">${sh}</div></div>`;
  } else {
    lw.innerHTML = '<div class="last-box"><div class="last-lbl">Last session</div><p class="no-last">No data yet — first time logging this</p></div>';
  }
  renderSets(ex, h);
  document.getElementById('prev-btn').style.display = idx === 0 ? 'none' : 'block';
  document.getElementById('next-btn').textContent = idx === currentDay.exercises.length-1 ? 'Done ✓' : 'Next →';
}

function renderSets(ex, h) {
  const wrap = document.getElementById('sets-wrap');
  wrap.innerHTML = '';
  const existing = sessionData[ex.id] || [];
  let defaultW = 0;
  if (h.sessions.length > 0 && h.sessions[h.sessions.length-1].sets?.length > 0) defaultW = h.sessions[h.sessions.length-1].sets[0].w || 0;
  for (let i = 0; i < ex.sets; i++) {
    const logged = existing[i];
    const row = document.createElement('div');
    row.className = 'set-row' + (logged ? ' logged' : '');
    row.id = 'sr-' + i;
    row.innerHTML = `<div class="set-lbl">Set ${i+1}</div><div class="inputs-grid"><div class="ig"><label>Weight kg</label><div class="stepper"><button onclick="step('w',${i},-2.5)">−</button><input type="number" id="w-${i}" value="${logged?.w??defaultW}" min="0" step="2.5"><button onclick="step('w',${i},2.5)">+</button></div></div><div class="ig"><label>Reps</label><div class="stepper"><button onclick="step('r',${i},-1)">−</button><input type="number" id="r-${i}" value="${logged?.r??ex.rng[0]}" min="1" step="1"><button onclick="step('r',${i},1)">+</button></div></div></div><button class="log-btn${logged?' logged':''}" id="lb-${i}" onclick="logSet(${i})">✓</button>`;
    wrap.appendChild(row);
  }
}
function step(type, i, delta) {
  const inp = document.getElementById(type+'-'+i);
  let v = parseFloat(inp.value)||0;
  inp.value = type==='w' ? Math.max(0, v+delta) : Math.max(1, Math.round(v+delta));
}
function logSet(i) {
  const ex = currentDay.exercises[currentItemIdx];
  const w = parseFloat(document.getElementById('w-'+i).value)||0;
  const r = parseInt(document.getElementById('r-'+i).value)||1;
  if (!sessionData[ex.id]) sessionData[ex.id] = [];
  sessionData[ex.id][i] = {w, r};
  document.getElementById('lb-'+i).classList.add('logged');
  document.getElementById('sr-'+i).classList.add('logged');
}

// ── RECOVERY LOG ─────────────────────────────────────────────────
function openRecItem(idx) {
  const ex = currentDay.exercises[idx];
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-rec').classList.add('active');
  document.getElementById('rec-log-name').textContent = ex.name;
  document.getElementById('rec-counter').textContent = (idx+1) + ' / ' + currentDay.exercises.length;
  const isDone = getItemDone(ex);
  const area = document.getElementById('rec-log-area');
  if (ex.type === 'walk') {
    const prev = recoveryData[ex.id];
    const h = historyCache[ex.id];
    let lastStr = '';
    if (h.sessions.length > 0) { const ls = h.sessions[h.sessions.length-1]; lastStr = `Last: ${ls.min}min · ${ls.incline}% · ${ls.pace}km/h (${formatDate(ls.date)})`; }
    area.innerHTML = `<div class="walk-card">
      <div class="walk-card-lbl">Log your walk</div>
      ${lastStr ? `<div class="walk-last">${lastStr}</div>` : ''}
      <div class="walk-fields">
        <div class="wf"><label>Minutes</label><input type="number" id="wk-min" value="${prev?.min??''}" placeholder="25" min="0" max="120"><div class="wf-unit">min</div></div>
        <div class="wf"><label>Incline</label><input type="number" id="wk-inc" value="${prev?.incline??''}" placeholder="5" min="0" max="15" step="0.5"><div class="wf-unit">%</div></div>
        <div class="wf"><label>Pace</label><input type="number" id="wk-pace" value="${prev?.pace??''}" placeholder="5.5" min="0" max="15" step="0.5"><div class="wf-unit">km/h</div></div>
      </div></div>
      <button class="log-action-btn${isDone?' logged-rec':''}" id="walk-btn" onclick="logWalk('${ex.id}')">
        ${isDone ? `✓ Logged — ${prev?.min}min · ${prev?.incline}% · ${prev?.pace}km/h` : 'Log walk'}</button>`;
  } else {
    area.innerHTML = `<button class="log-action-btn${isDone?' logged-rec':''}" id="check-btn" onclick="logCheck('${ex.id}')">${isDone?'✓ Done':'Mark as done'}</button>`;
  }
  document.getElementById('rec-prev-btn').style.display = idx === 0 ? 'none' : 'block';
  document.getElementById('rec-next-btn').textContent = idx === currentDay.exercises.length-1 ? 'Done ✓' : 'Next →';
}
function logWalk(exId) {
  const min = parseFloat(document.getElementById('wk-min').value)||0;
  const incline = parseFloat(document.getElementById('wk-inc').value)||0;
  const pace = parseFloat(document.getElementById('wk-pace').value)||0;
  const data = {min, incline, pace};
  recoveryData[exId] = data;
  const btn = document.getElementById('walk-btn');
  if (btn) { btn.classList.add('logged-rec'); btn.textContent = `✓ Logged — ${min}min · ${incline}% · ${pace}km/h`; }
  const h = historyCache[exId] || {sessions:[]};
  const todayStr = today();
  const filtered = h.sessions.filter(s => s.date !== todayStr);
  filtered.push({date: todayStr, ...data});
  if (filtered.length > 8) filtered.shift();
  h.sessions = filtered;
  historyCache[exId] = h;
  saveHist(currentDay.id, exId, h);
  refreshCard(currentDay.exercises.findIndex(e => e.id === exId));
}
function logCheck(exId) {
  recoveryData[exId] = true;
  const btn = document.getElementById('check-btn');
  if (btn) { btn.classList.add('logged-rec'); btn.textContent = '✓ Done'; }
  refreshCard(currentDay.exercises.findIndex(e => e.id === exId));
}
function refreshCard(idx) {
  if (idx < 0) return;
  const card = document.getElementById('card-' + idx);
  if (!card) return;
  const ex = currentDay.exercises[idx];
  const isDone = getItemDone(ex);
  card.classList.toggle('done-card', isDone);
  const chkEl = card.querySelector('.rec-chk');
  if (chkEl) chkEl.textContent = isDone ? '✓' : '';
}

// ── NAV ──────────────────────────────────────────────────────────
function saveExercise(ex) {
  if (!sessionData[ex.id] || !sessionData[ex.id].filter(Boolean).length) return;
  const sets = sessionData[ex.id].filter(Boolean);
  const h = historyCache[ex.id];
  const todayStr = today();
  const filtered = h.sessions.filter(s => s.date !== todayStr);
  filtered.push({date: todayStr, sets});
  if (filtered.length > 5) filtered.shift();
  h.sessions = filtered;
  saveHist(currentDay.id, ex.id, h);
}
function goNextItem() {
  const ex = currentDay.exercises[currentItemIdx];
  if (ex.type !== 'walk' && ex.type !== 'check') saveExercise(ex);
  if (currentItemIdx < currentDay.exercises.length-1) openItem(currentItemIdx+1); else showDay();
}
function goPrevItem() {
  const ex = currentDay.exercises[currentItemIdx];
  if (ex.type !== 'walk' && ex.type !== 'check') saveExercise(ex);
  if (currentItemIdx > 0) openItem(currentItemIdx-1);
}
function showDay() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-day').classList.add('active');
  renderExList();
}

// ── FINISH ───────────────────────────────────────────────────────
function finishSession() {
  for (const ex of currentDay.exercises) {
    if (ex.type !== 'walk' && ex.type !== 'check' && sessionData[ex.id]) saveExercise(ex);
  }
  document.getElementById('finish-date').textContent = currentDay.name + ' · ' + formatDate(today());
  if (currentDay.type === 'recovery') {
    const walk = recoveryData['incline_walk'];
    const mobDone = currentDay.exercises.filter(e => e.type==='check' && recoveryData[e.id]).length;
    const mobTotal = currentDay.exercises.filter(e => e.type==='check').length;
    document.getElementById('finish-summary').innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:16px 0;"><div class="s-card green"><div class="sv">${walk?.min||0}<span style="font-size:13px;font-weight:400">m</span></div><div class="sl">Walked</div></div><div class="s-card"><div class="sv">${walk?.incline||'–'}<span style="font-size:13px;font-weight:400">%</span></div><div class="sl">Incline</div></div><div class="s-card"><div class="sv">${mobDone}/${mobTotal}</div><div class="sl">Mobility</div></div></div>`;
    document.getElementById('finish-flags').innerHTML = '<p style="color:#555;font-size:13px;">Consistency is the goal for recovery days. Same time next week.</p>';
  } else {
    const totalSets = Object.values(sessionData).reduce((a,v) => a+(v?.filter(Boolean).length||0), 0);
    const doneEx = Object.keys(sessionData).length;
    document.getElementById('finish-summary').innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;"><div class="s-card green"><div class="sv">${doneEx}</div><div class="sl">Exercises</div></div><div class="s-card"><div class="sv">${totalSets}</div><div class="sl">Total sets</div></div></div>`;
    const flags = document.getElementById('finish-flags');
    flags.innerHTML = '';
    let any = false;
    for (const ex of currentDay.exercises) {
      if (!ex.rng) continue;
      const prog = getProgStatus(historyCache[ex.id]?.sessions, ex.rng);
      if (prog) {
        any = true;
        const d = document.createElement('div');
        d.className = 'prog-banner ' + prog;
        d.textContent = prog === 'up' ? '↑ ' + ex.name + ' — increase weight next session' : '→ ' + ex.name + ' — hit top rep range one more time';
        flags.appendChild(d);
      }
    }
    if (!any) flags.innerHTML = '<p style="color:#555;font-size:13px;">No progression flags yet. Keep hitting your rep ranges.</p>';
  }
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-finish').classList.add('active');
}

showHome();
</script>
</body>
</html>
